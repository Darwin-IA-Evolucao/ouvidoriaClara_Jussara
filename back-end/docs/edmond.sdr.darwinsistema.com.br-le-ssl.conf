<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName edmond.sdr.darwinsistema.com.br

    DocumentRoot /var/www/html/clientes/sdr_edmond

    <Directory /var/www/html/clientes/sdr_edmond>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Proxy backend
    ProxyPreserveHost On
    ProxyPass /api http://127.0.0.1:3077
    ProxyPassReverse /api http://127.0.0.1:3077

    ErrorLog ${APACHE_LOG_DIR}/sdr_edmond_error.log
    CustomLog ${APACHE_LOG_DIR}/sdr_edmond_access.log combined

SSLCertificateFile /etc/letsencrypt/live/edmond.sdr.darwinsistema.com.br/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/edmond.sdr.darwinsistema.com.br/privkey.pem
Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>

